<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Tracker Solany</title>

<style>
    body {
        font-family: "Georgia", serif;
        background: #1b1a17;
        color: #e8dcc0;
        text-align: center;
        padding: 20px;
    }

    h1 {
        font-size: 36px;
        margin-bottom: 30px;
        color: #d4af37;
        text-shadow: 0 0 10px black;
    }

    .gun {
        border: 2px solid #6b5b3e;
        border-radius: 10px;
        padding: 20px;
        margin: 20px auto;
        width: 320px;
        background: linear-gradient(145deg, #2c2a24, #1a1916);
        box-shadow: 0 0 15px black;
    }

    h2 {
        color: #c9b37e;
    }

    .label {
        font-size: 14px;
        color: #aaa;
    }

    img {
        width: 120px;
        margin: 10px 0;
        filter: sepia(60%) contrast(120%);
    }

    .bar-container {
        width: 100%;
        height: 25px;
        background: #3a352a;
        border: 1px solid #6b5b3e;
        border-radius: 5px;
        margin: 10px 0;
    }

    .bar {
        height: 100%;
        background: linear-gradient(90deg, #8b0000, #d4af37);
        width: 0%;
        border-radius: 5px;
        transition: width 0.3s;
    }

    button {
        margin: 5px;
        padding: 8px 12px;
        border: 1px solid #6b5b3e;
        border-radius: 5px;
        cursor: pointer;
        font-family: inherit;
    }

    .fire { background: #5a1f1f; color: white; }
    .add { background: #2f5a2f; color: white; }
    .edit { background: #2f3f5a; color: white; }

    input {
        width: 60px;
        padding: 5px;
        margin: 5px;
        text-align: center;
        background: #1a1916;
        color: #e8dcc0;
        border: 1px solid #6b5b3e;
    }
</style>
</head>
<body>

<h1>Tracker Solany</h1>

<div class="gun">
    <h2>Garłacz</h2>

    <!-- Obrazek garłacza -->
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7e/Blunderbuss.jpg/320px-Blunderbuss.jpg">

    <div class="label">Śrut</div>
    <div>Ilość: <span id="blunderbussCount">0</span></div>

    <div class="bar-container">
        <div id="blunderbussBar" class="bar"></div>
    </div>

    <button class="fire" onclick="fire('blunderbuss')">STRZAŁ</button><br>

    Dodaj: <input type="number" id="blunderbussAdd" value="1">
    <button class="add" onclick="addAmmo('blunderbuss')">Dodaj</button><br>

    Ustaw: <input type="number" id="blunderbussSet">
    <button class="edit" onclick="setAmmo('blunderbuss')">Ustaw</button>
</div>

<div class="gun">
    <h2>Pistolet</h2>

    <!-- Obrazek pistoletu -->
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/19/Colt_SAA.jpg/320px-Colt_SAA.jpg">

    <div class="label">Naboje</div>
    <div>Ilość: <span id="pistolCount">0</span></div>

    <div class="bar-container">
        <div id="pistolBar" class="bar"></div>
    </div>

    <button class="fire" onclick="fire('pistol')">STRZAŁ</button><br>

    Dodaj: <input type="number" id="pistolAdd" value="1">
    <button class="add" onclick="addAmmo('pistol')">Dodaj</button><br>

    Ustaw: <input type="number" id="pistolSet">
    <button class="edit" onclick="setAmmo('pistol')">Ustaw</button>
</div>

<script>
let ammo = {
    blunderbuss: 0,
    pistol: 0
};

let maxAmmo = {
    blunderbuss: 50,
    pistol: 50
};

// 🔹 Wczytanie zapisanych danych
function loadData() {
    let saved = localStorage.getItem("ammoTracker");
    if (saved) {
        ammo = JSON.parse(saved);
    }
}

// 🔹 Zapis danych
function saveData() {
    localStorage.setItem("ammoTracker", JSON.stringify(ammo));
}

function updateUI(type) {
    document.getElementById(type + "Count").innerText = ammo[type];

    let percent = (ammo[type] / maxAmmo[type]) * 100;
    percent = Math.min(percent, 100);

    document.getElementById(type + "Bar").style.width = percent + "%";
}

function fire(type) {
    if (ammo[type] > 0) {
        ammo[type]--;
        saveData();
        updateUI(type);
    }
}

function addAmmo(type) {
    let value = parseInt(document.getElementById(type + "Add").value);
    if (!isNaN(value)) {
        ammo[type] += value;
        saveData();
        updateUI(type);
    }
}

function setAmmo(type) {
    let value = parseInt(document.getElementById(type + "Set").value);
    if (!isNaN(value)) {
        ammo[type] = value;
        saveData();
        updateUI(type);
    }
}

// Start
loadData();
updateUI('blunderbuss');
updateUI('pistol');
</script>

</body>
</html>
