<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Przelicznik WFRP</title>

<!-- Fonty klimatyczne -->
<link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=IM+Fell+English&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;

        background: #2c241a;
    }

    .parchment {
        background: radial-gradient(circle at 50% 50%, #f5e6c8, #e2cfa3);
        border: 2px solid #8b6f3d;
        border-radius: 12px;
        padding: 25px;
        width: 300px;

        box-shadow:
            inset 0 0 30px rgba(0,0,0,0.2),
            0 0 25px rgba(0,0,0,0.6);

        font-family: 'IM Fell English', serif;
        color: #2b1d0e;
    }

    h3 {
        text-align: center;
        font-family: 'Uncial Antiqua', cursive;
        margin-bottom: 15px;
    }

    .inputs {
        display: flex;
        justify-content: space-between;
    }

    input {
        width: 70px;
        padding: 6px;
        border: 1px solid #8b6f3d;
        border-radius: 6px;
        background: rgba(255,255,255,0.4);
        text-align: center;
        font-family: inherit;
    }

    button {
        margin-top: 10px;
        width: 100%;
        padding: 8px;
        border: none;
        border-radius: 6px;

        background: #8b6f3d;
        color: #f5e6c8;
        font-family: 'Uncial Antiqua', cursive;
        cursor: pointer;
    }

    button:hover {
        background: #a6844a;
    }

    #result {
        margin-top: 15px;
        text-align: center;
        font-weight: bold;
    }

    .note {
        font-size: 12px;
        margin-top: 10px;
        text-align: center;
        opacity: 0.7;
    }
</style>
</head>

<body>

<div class="parchment">
    <h3>💰 Mennica Imperium</h3>

    <div class="inputs">
        <input id="zk" type="number" placeholder="ZK">
        <input id="ss" type="number" placeholder="ss">
        <input id="mp" type="number" placeholder="mp">
    </div>

    <button onclick="convertToMP()">→ przelicz na pensy</button>
    <button onclick="convertFromMP()">→ rozbij na monety</button>

    <p id="result"></p>

    <div class="note">
        1 ZK = 20 ss = 240 mp
    </div>
</div>

<script>
function convertToMP() {
    let zk = parseInt(document.getElementById("zk").value) || 0;
    let ss = parseInt(document.getElementById("ss").value) || 0;
    let mp = parseInt(document.getElementById("mp").value) || 0;

    let total = zk * 240 + ss * 12 + mp;

    document.getElementById("result").innerText =
        "Łącznie: " + total + " mp";
}

function convertFromMP() {
    let total = parseInt(prompt("Podaj ilość pensów (mp):")) || 0;

    let zk = Math.floor(total / 240);
    total %= 240;

    let ss = Math.floor(total / 12);
    let mp = total % 12;

    document.getElementById("result").innerText =
        zk + " ZK, " + ss + " ss, " + mp + " mp";
}
</script>

</body>
</html>
