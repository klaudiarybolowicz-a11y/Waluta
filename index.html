<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Mennica Imperium</title>

<link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=IM+Fell+English&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #2c241a;
}

.parchment {
    background: radial-gradient(circle, #f5e6c8, #e2cfa3);
    border: 2px solid #8b6f3d;
    border-radius: 12px;
    padding: 25px;
    width: 320px;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.2), 0 0 25px rgba(0,0,0,0.6);
    font-family: 'IM Fell English', serif;
    color: #2b1d0e;
}

h3 {
    text-align: center;
    font-family: 'Uncial Antiqua', cursive;
}

input {
    width: 100%;
    padding: 8px;
    border: 1px solid #8b6f3d;
    border-radius: 6px;
    background: rgba(255,255,255,0.4);
    margin-top: 10px;
    font-family: inherit;
    text-align: center;
}

.result {
    margin-top: 15px;
    text-align: center;
    font-weight: bold;
}

.note {
    font-size: 12px;
    margin-top: 10px;
    text-align: center;
    opacity: 0.7;
}
</style>
</head>

<body>

<div class="parchment">
    <h3>💰 Mennica Imperium</h3>

    <input id="input" placeholder="np. 2zk 5ss 10mp lub 500">

    <div class="result" id="result">—</div>

    <div class="note">
        1 Złota Korona = 20 Szylingów = 240 Pensów
    </div>
</div>

<script>
const input = document.getElementById("input");
const result = document.getElementById("result");

input.addEventListener("input", () => {
    let text = input.value.toLowerCase();

    let zk = 0, ss = 0, mp = 0;

    // Szukaj wartości typu "2zk"
    let zkMatch = text.match(/(\d+)\s*zk/);
    let ssMatch = text.match(/(\d+)\s*ss/);
    let mpMatch = text.match(/(\d+)\s*mp/);

    if (zkMatch) zk = parseInt(zkMatch[1]);
    if (ssMatch) ss = parseInt(ssMatch[1]);
    if (mpMatch) mp = parseInt(mpMatch[1]);

    // Jeśli wpisano tylko liczbę → traktuj jako pensy
    if (!zkMatch && !ssMatch && !mpMatch && text.match(/^\d+$/)) {
        mp = parseInt(text);
    }

    // Przelicz na pensy
    let total = zk * 240 + ss * 12 + mp;

    // Rozbij
    let outZK = Math.floor(total / 240);
    total %= 240;

    let outSS = Math.floor(total / 12);
    let outMP = total % 12;

    result.innerText =
        outZK + " Złote Korony, " +
        outSS + " Szylingi, " +
        outMP + " Pensy";
});
</script>

</body>
</html>
