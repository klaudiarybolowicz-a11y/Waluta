<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Mennica Imperium</title>

<link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=IM+Fell+English&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #1f1a12;
}

/* ŚWIECA */
.candle {
    position: absolute;
    top: 10%;
    width: 10px;
    height: 40px;
    background: #eee;
    border-radius: 3px;
}

.flame {
    position: absolute;
    top: -15px;
    left: -5px;
    width: 20px;
    height: 20px;
    background: radial-gradient(circle, #ffdd88, #ff9900, transparent);
    border-radius: 50%;
    animation: flicker 0.15s infinite;
}

/* MIGOTANIE */
@keyframes flicker {
    0% { transform: scale(1) translateX(0); opacity: 0.9; }
    50% { transform: scale(1.1) translateX(1px); opacity: 1; }
    100% { transform: scale(0.95) translateX(-1px); opacity: 0.85; }
}

/* PERGAMIN */
.parchment {
    position: relative;
    background: radial-gradient(circle, #f5e6c8, #e2cfa3);
    border: 2px solid #8b6f3d;
    border-radius: 12px;
    padding: 25px;
    width: 320px;

    box-shadow:
        inset 0 0 30px rgba(0,0,0,0.2),
        0 0 40px rgba(255,200,120,0.2);

    animation: glow 3s infinite alternate;

    font-family: 'IM Fell English', serif;
    color: #2b1d0e;
}

/* DELIKATNY PULS ŚWIATŁA */
@keyframes glow {
    from { box-shadow: inset 0 0 30px rgba(0,0,0,0.2), 0 0 20px rgba(255,200,120,0.15); }
    to { box-shadow: inset 0 0 35px rgba(0,0,0,0.25), 0 0 60px rgba(255,200,120,0.35); }
}

h3 {
    text-align: center;
    font-family: 'Uncial Antiqua', cursive;
}

input {
    width: 100%;
    padding: 8px;
    border: 1px solid #8b6f3d;
    border-radius: 6px;
    background: rgba(255,255,255,0.4);
    margin-top: 10px;
    font-family: inherit;
    text-align: center;
}

.result {
    margin-top: 15px;
    text-align: center;
    font-weight: bold;
}

.note {
    font-size: 12px;
    margin-top: 10px;
    text-align: center;
    opacity: 0.7;
}

.footer {
    margin-top: 15px;
    font-size: 11px;
    text-align: center;
    font-style: italic;
    opacity: 0.6;
}
</style>
</head>

<body>

<!-- świeca -->
<div class="candle">
    <div class="flame"></div>
</div>

<div class="parchment">
    <h3>💰 Mennica Imperium</h3>

    <input id="input" placeholder="np. 2zk 5ss 10mp lub 500">

    <div class="result" id="result">—</div>

    <div class="note">
        1 Złota Korona = 20 Szylingów = 240 Pensów
    </div>

    <div class="footer">
        zatwierdzone przez kupców Altdorfu
    </div>
</div>

<script>
const input = document.getElementById("input");
const result = document.getElementById("result");

input.addEventListener("input", () => {
    let text = input.value.toLowerCase();

    let zk = 0, ss = 0, mp = 0;

    let zkMatch = text.match(/(\d+)\s*zk/);
    let ssMatch = text.match(/(\d+)\s*ss/);
    let mpMatch = text.match(/(\d+)\s*mp/);

    if (zkMatch) zk = parseInt(zkMatch[1]);
    if (ssMatch) ss = parseInt(ssMatch[1]);
    if (mpMatch) mp = parseInt(mpMatch[1]);

    if (!zkMatch && !ssMatch && !mpMatch && text.match(/^\d+$/)) {
        mp = parseInt(text);
    }

    let total = zk * 240 + ss * 12 + mp;

    let outZK = Math.floor(total / 240);
    total %= 240;

    let outSS = Math.floor(total / 12);
    let outMP = total % 12;

    result.innerText =
        outZK + " Złote Korony, " +
        outSS + " Szylingi, " +
        outMP + " Pensy";
});
</script>

</body>
</html>
