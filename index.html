<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Mennica Imperialna</title>
  <style>
    body {
      margin: 0;
      font-family: "Georgia", serif;
      background: radial-gradient(circle at center, #3b2f2f, #1e1515);
      color: #2b1b0f;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: url("https://www.transparenttextures.com/patterns/aged-paper.png"), #f4e7c5;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 40px rgba(0,0,0,0.7);
      width: 320px;
      text-align: center;
      position: relative;
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
      letter-spacing: 2px;
    }

    .flavour {
      font-size: 12px;
      margin-bottom: 20px;
      font-style: italic;
    }

    .field {
      margin: 10px 0;
    }

    label {
      display: block;
      margin-bottom: 5px;
    }

    input {
      width: 100%;
      padding: 8px;
      border: 1px solid #8b6f47;
      border-radius: 6px;
      background: #fff8dc;
      font-size: 16px;
      text-align: center;
    }

    input:focus {
      outline: none;
      border-color: #5c3b1e;
    }

    .footer {
      margin-top: 20px;
      font-size: 11px;
      opacity: 0.8;
    }

    /* Subtelny efekt świecy */
    .container::before {
      content: "";
      position: absolute;
      top: -20px;
      left: 50%;
      width: 10px;
      height: 40px;
      background: linear-gradient(#ffd27f, #ff9f1c);
      border-radius: 5px;
      transform: translateX(-50%);
      box-shadow: 0 0 20px rgba(255, 200, 100, 0.8);
      animation: flicker 1.5s infinite alternate;
    }

    @keyframes flicker {
      0% { opacity: 0.8; transform: translateX(-50%) scaleY(1); }
      100% { opacity: 1; transform: translateX(-50%) scaleY(1.1); }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Mennica Imperialna</h1>
  <div class="flavour">Zatwierdzone przez kupców z Altdorfu</div>

  <div class="field">
    <label>Złote Korony (ZK)</label>
    <input type="number" id="zk" oninput="fromZK()">
  </div>

  <div class="field">
    <label>Szylingi (Sz)</label>
    <input type="number" id="sz" oninput="fromSZ()">
  </div>

  <div class="field">
    <label>Pensy (P)</label>
    <input type="number" id="p" oninput="fromP()">
  </div>

  <div class="footer">
    1 ZK = 20 Sz = 240 P
  </div>
</div>

<script>
  function fromZK() {
    let zk = parseFloat(document.getElementById("zk").value) || 0;

    document.getElementById("sz").value = (zk * 20).toFixed(2);
    document.getElementById("p").value = (zk * 240).toFixed(0);
  }

  function fromSZ() {
    let sz = parseFloat(document.getElementById("sz").value) || 0;

    document.getElementById("zk").value = (sz / 20).toFixed(2);
    document.getElementById("p").value = (sz * 12).toFixed(0);
  }

  function fromP() {
    let p = parseFloat(document.getElementById("p").value) || 0;

    document.getElementById("zk").value = (p / 240).toFixed(2);
    document.getElementById("sz").value = (p / 12).toFixed(2);
  }
</script>

</body>
</html>
